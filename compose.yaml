services:
  db:
    image: postgres:18.4
    restart: always
    environment:
      POSTGRES_USER: paydash_admin
      POSTGRES_PASSWORD: "1QTr2puWICDy3k5D"
      POSTGRES_DB: paydash
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/18/docker

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DB_URL=postgres://paydash_admin:1QTr2puWICDy3k5D@db:5432/paydash?sslmode=disable
    depends_on:
      - db
    develop:
      watch:
        - action: rebuild
          path: ./backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - backend
    ports:
      - "3001:3001"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/v1
      - PORT=3001
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - frontend/node_modules/
            - frontend/.next/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  pg-data:
